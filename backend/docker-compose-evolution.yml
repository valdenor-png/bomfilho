version: '3.8'

services:
  evolution-api:
    image: atendai/evolution-api:v1.7.4
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=bom_filho_whatsapp_2026
      - DEL_INSTANCE=false
      - QRCODE_COLOR=#198754
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

volumes:
  evolution_instances:
  evolution_store:
