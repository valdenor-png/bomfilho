name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint backend (bloqueante)
        run: npx eslint . --max-warnings 0

      - name: Verificar bootstrap backend (dry load)
        run: node -e "require('./server.js')"
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          JWT_SECRET: ci-test-secret
          MP_ACCESS_TOKEN: TEST-00000000000000000000000000000000
          NODE_ENV: test

      - name: Testes críticos backend (checkout/idempotência)
        run: npm test -- --runInBand tests/pedido-pagamento.test.js tests/distributed-idempotency.test.js tests/webhooks-mercadopago.test.js tests/admin-operacional.test.js tests/mercadopago-routes.test.js tests/produtos-importacao.test.js tests/ofertas-dia-auth.test.js tests/auth-middleware-security.test.js tests/pedidos-ownership.test.js

  backend-integration-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bomfilho_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bomfilho_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Testes de integração com PostgreSQL real
        run: npm test -- --runInBand tests/cupons-date-semantics.integration.test.js tests/pedido-pagamento.test.js
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/bomfilho_ci
          JWT_SECRET: ci-test-secret-ci-test-secret-32chars
          MP_ACCESS_TOKEN: TEST-00000000000000000000000000000000
          NODE_ENV: test
          RUN_DB_INTEGRATION_TESTS: "true"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: https://api.example.com

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - run: npm ci

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true  # TODO: remove after fixing 3 existing errors

  migrations-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Verificar numeração sequencial das migrações
        run: |
          ls migrations/*.sql | sort | head -20
          echo "✅ Arquivos de migração listados com sucesso"

      - name: Verificar sintaxe SQL básica
        run: |
          for f in migrations/*.sql; do
            if ! head -1 "$f" | grep -qiE '(CREATE|ALTER|INSERT|DROP|SET|--|\/)'; then
              echo "⚠️ $f pode ter problema de sintaxe na primeira linha"
            fi
          done
          echo "✅ Verificação de migrações concluída"

  migrations-runner-clean-db:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bomfilho_migrations_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bomfilho_migrations_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Executar migrações em banco limpo
        run: npm run migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/bomfilho_migrations_ci

      - name: Validar tabela de controle de migração
        run: |
          node -e "
          const { Client } = require('pg');
          (async () => {
            const client = new Client({ connectionString: process.env.DATABASE_URL });
            await client.connect();
            const r = await client.query('SELECT COUNT(*)::int AS total FROM schema_migrations');
            await client.end();
            const total = Number(r.rows?.[0]?.total || 0);
            if (!Number.isFinite(total) || total <= 0) {
              throw new Error('schema_migrations sem registros apos runner de migracao');
            }
            console.log('✅ schema_migrations preenchida:', total);
          })().catch((err) => { console.error(err); process.exit(1); });
          "
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/bomfilho_migrations_ci
