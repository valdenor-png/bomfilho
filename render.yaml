services:
  - type: web
    name: bomfilho-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_REACT
        value: "false"
      - key: TRUST_PROXY
        value: "true"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: RECAPTCHA_MIN_SCORE
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_LOCAL_ONLY
        sync: false
      - key: BASE_URL
        sync: false
      - key: PAGBANK_ENV
        sync: false
      - key: PAGBANK_TOKEN
        sync: false
      - key: PAGBANK_PUBLIC_KEY
        sync: false
      - key: PAGBANK_WEBHOOK_TOKEN
        sync: false
      - key: PAGBANK_DEBUG_LOGS
        sync: false
      - key: ALLOW_PIX_MOCK
        value: "false"
      - key: ALLOW_DEBIT_3DS_MOCK
        value: "false"
      - key: DIAGNOSTIC_TOKEN
        sync: false
      - key: ALLOW_REMOTE_DIAGNOSTIC
        value: "false"
      - key: CEP_MERCADO
        sync: false
      - key: NUMERO_MERCADO
        sync: false
      - key: LIMITE_BIKE_KM
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: EVOLUTION_INSTANCE
        sync: false
