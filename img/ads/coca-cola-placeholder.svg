    <text x="170" y="56" text-anchor="middle" fill="#C8102E" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Ver ofertas</text>
  </g>

  <text x="90" y="640" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="22" opacity="0.8">Troque esta arte por uma foto sua (ou imagem com licença comercial).</text>
